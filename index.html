<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perspectives from the Hart | Sovereign Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vanta: '#050505',
                        nickel: '#C0C0C0',
                        'nickel-dim': '#4A4A4A',
                        platinum: '#E5E4E2'
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* SOVEREIGN STYLES */
        body { background-color: #050505; color: #C0C0C0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #4A4A4A; border-radius: 3px; }
        ::selection { background: #C0C0C0; color: #050505; }
        
        .shimmer { transition: all 0.5s ease; filter: drop-shadow(0 0 0 transparent); }
        .shimmer:hover { filter: drop-shadow(0 0 10px rgba(229, 228, 226, 0.6)); transform: scale(1.01); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-enter { animation: fadeIn 1s ease-out forwards; }
    </style>
</head>
<body class="overflow-x-hidden antialiased selection:bg-nickel selection:text-vanta">

    <div class="fixed bottom-0 right-0 z-50 pointer-events-none h-screen w-full md:w-1/2 flex items-end justify-end">
        <img src="assets/curator.png" onerror="this.style.display='none'" class="h-[85vh] object-cover opacity-90 fade-enter" alt="Curator">
    </div>

    <nav class="fixed top-0 w-full z-40 bg-vanta/95 backdrop-blur-md border-b border-nickel-dim/20">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="assets/logo copy.jpg" onerror="this.src='assets/logo copy.jpg'" class="h-10 w-auto opacity-90 hover:opacity-100 transition-opacity">
                <div class="hidden md:block leading-tight">
                    <h1 class="font-serif text-lg tracking-[0.2em] text-platinum">PERSPECTIVES</h1>
                    <p class="text-[0.55rem] uppercase tracking-[0.4em] text-nickel-dim">From the Hart Photography</p>
                </div>
            </div>
            <a href="mailto:joshuaphart@gmail.com?subject=Acquisition Inquiry: Sovereign Collection" 
               class="border border-nickel/50 px-6 py-2 text-xs uppercase tracking-widest hover:bg-platinum hover:text-vanta hover:border-platinum transition-all duration-500">
                Inquire
            </a>
        </div>
    </nav>

    <header class="relative h-screen flex items-center px-6 max-w-7xl mx-auto z-10">
        <div class="max-w-3xl space-y-8 fade-enter">
            <div class="w-24 h-1 bg-gradient-to-r from-nickel to-transparent"></div>
            <h2 class="font-serif text-5xl md:text-8xl leading-none text-white">
                The Sovereign <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-platinum to-nickel-dim italic">Collection.</span>
            </h2>
            <p class="font-sans text-nickel text-lg max-w-lg border-l-2 border-nickel/30 pl-6 py-2">
                2,000 moments curated by the Kernel. <br>
                <span class="text-sm text-nickel-dim uppercase tracking-widest">Blue Ridge • Macro • Industrial</span>
            </p>
            <div class="flex gap-4 pt-4">
                <button onclick="document.getElementById('gallery-nexus').scrollIntoView({behavior: 'smooth'})" 
                        class="bg-platinum text-vanta px-8 py-3 font-bold uppercase tracking-widest hover:bg-white hover:scale-105 transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                    Enter Gallery
                </button>
            </div>
        </div>
    </header>

    <section id="gallery-nexus" class="py-24 px-4 bg-black relative z-20 border-t border-nickel-dim/20">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-end mb-12">
                <h3 class="font-serif text-2xl text-nickel">Curated Selection</h3>
                <div class="text-right">
                    <p class="font-mono text-[0.6rem] text-nickel-dim">BATCH: 2026-ALPHA</p>
                    <p class="font-mono text-[0.6rem] text-nickel-dim">STATUS: AVAILABLE</p>
                </div>
            </div>
            
            <div id="photo-grid" class="grid grid-cols-1 md:grid-cols-3 gap-1"></div>
        </div>
    </section>

    <footer class="py-12 border-t border-nickel-dim/20 bg-vanta text-center">
        <img src="assets/logo copy.jpg" onerror="this.style.display='none'" class="h-8 w-auto mx-auto mb-4 opacity-50">
        <p class="font-mono text-[0.6rem] text-nickel-dim tracking-[0.3em] uppercase">
            &copy; 2026 Perspectives from the Hart • CAGE 17CR1
        </p>
    </footer>

    
    <script>
        // GRID GENERATOR — uses local assets first, then Unsplash fallback
        const grid = document.getElementById('photo-grid');

        const localPhotos = [
            { src: 'assets/985B68C9-3193-49E6-97B5-5CB5CC9C1957_1_201_a.jpeg', title: 'Blue Ridge Solace', id: 'PFTH-4001', theme: 'Ridge' },
            { src: 'assets/E08EC141-5E70-42FD-8979-9868F9749EB2_4_5005_c.jpeg', title: 'Iron & Rust Vol.2', id: 'PFTH-4002', theme: 'Steel' },
            { src: 'assets/Gemini_Generated_Image_3gxu233gxu233gxu.jpeg', title: 'Macro Lattice', id: 'PFTH-4003', theme: 'Macro' }
        ];

        const fallbackThemes = ['Mist', 'River', 'Steel', 'Forest', 'Macro', 'Light'];
        const totalItems = 12;

        for (let i = 0; i < totalItems; i++) {
            const local = localPhotos[i % localPhotos.length];
            const theme = local?.theme || fallbackThemes[i % fallbackThemes.length];
            const title = local?.title || `${theme} Study No. ${String(i + 1).padStart(2, '0')}`;
            const id = local?.id || `PFTH-${4000 + i + 1}`;
            const src = local?.src || `https://source.unsplash.com/random/800x800?nature,${theme}&sig=${i + 1}`;
            const subject = encodeURIComponent(`Purchase Inquiry: ${title}`);

            const card = document.createElement('div');
            card.className = "relative group aspect-square overflow-hidden bg-nickel-dim/5 cursor-crosshair";
            card.innerHTML = `
                <img src="${src}"
                     loading="lazy"
                     class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700 ease-out"
                     alt="${title}">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
                <div class="absolute bottom-0 left-0 w-full p-6 translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
                    <p class="font-serif text-xl text-white italic">${title}</p>
                    <div class="flex justify-between items-center mt-2 opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-100">
                        <span class="font-mono text-[0.6rem] text-nickel uppercase">ID: ${id}</span>
                        <a href="mailto:joshuaphart@gmail.com?subject=${subject}"
                           class="bg-platinum text-vanta text-[0.6rem] font-bold px-3 py-1 uppercase tracking-wider hover:bg-white">
                            Acquire
                        </a>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }
    </script>
</body>
</html>
